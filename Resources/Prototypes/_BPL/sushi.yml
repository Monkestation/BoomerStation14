- type: gameMap
  id: Sushi
  mapName: 'Sushi Station'
  mapPath: /Maps/_BPL/sushi.yml
  minPlayers: 25
  maxPlayers: 80
  stations:
    Sushi:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Sushi Station {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: 'SDC'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/_BPL/Shuttles/emergency_sushi.yml
        - type: StationJobs
          availableJobs: # 67 jobs total w/o latejoins & interns, 79 jobs total w/ latejoins & interns
            #Command (7)
            Captain: [ 1, 1 ]
            HeadOfPersonnel: [ 1, 1 ]
            HeadOfSecurity: [ 1, 1 ]
            ChiefMedicalOfficer: [ 1, 1 ]
            ChiefEngineer: [ 1, 1 ]
            ResearchDirector: [ 1, 1 ]
            Quartermaster: [ 1, 1 ]
            #Service (13)
            Bartender: [ 2, 2 ]
            Botanist: [ 2, 2 ]
            Chef: [ 2, 2 ]
            Janitor: [ 2, 2 ]
            Chaplain: [ 1, 1 ]
            Librarian: [ 1, 1 ]
            Reporter: [ 1, 1 ]
            ServiceWorker: [ 2, 2 ]
            #Engineering (7)
            AtmosphericTechnician: [ 3, 3 ]
            StationEngineer: [ 4, 4 ] #-2,2
            TechnicalAssistant: [ 4, 4 ] #intern, exclude from dept count
            #Medical (8)
            Chemist: [ 2, 2 ]
            MedicalDoctor: [ 4, 4 ]
            Paramedic: [ 1, 1 ]
            MedicalIntern: [ 4, 4 ] #intern, exclude from dept count
            Psychologist: [ 1, 1 ]
            #Science (5)
            Scientist: [ 4, 4 ]
            ResearchAssistant: [ 4, 4 ] #intern, exclude from dept count
            #SalesClerk: [ 1, 1 ] # Disabled on Boomer
            #Security (11 - 12)
            Warden: [ 1, 1 ]
            SecurityOfficer: [ 5, 5 ] #-1
            Detective: [ 1, 1 ]
            SecurityCadet: [ 4, 4 ] #intern, exclude from dept count
            Lawyer: [ 2, 2 ]
            #BrigMedic: [ 1, 1 ] # Disabled on Boomer
            #Supply (6)
            SalvageSpecialist: [ 3, 3 ]
            CargoTechnician: [ 3, 3 ]
            #Civilian (3+)
            Passenger: [ -1, -1 ] #infinite, not counted
            Clown: [ 1, 1 ]
            Mime: [ 1, 1 ]
            Musician: [ 1, 1 ]
            #Silicon (5)
            StationAi: [ 1, 1 ]
            Borg: [ 3, 3 ] #-1,1
