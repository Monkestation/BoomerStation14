- type: entity
  parent: ReagentDispenserBase
  id: SodaDispenserEmpty
  name: soda dispenser
  description: A beverage dispenser with a selection of soda and several other common beverages. Has a single fill slot for containers.
  suffix: Empty
  components:
  - type: Rotatable
  - type: Sprite
    sprite: Structures/smalldispensers.rsi
    drawdepth: SmallObjects
    state: soda
  - type: Transform
    noRot: false
  - type: Machine
    board: SodaDispenserMachineCircuitboard
  - type: GuideHelp
    guides:
    - Bartender
    - Drinks

# Boomer edit: SS13-style soda dispenser. Fixed reagent list generated on demand, gated by energy.
- type: entity
  parent: SodaDispenserEmpty
