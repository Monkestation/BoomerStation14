- type: entity
  id: BoozeDispenserEmpty
  name: booze dispenser
  suffix: Empty
  description: A booze dispenser with a single slot for a container to be filled.
  parent: ReagentDispenserBase
  components:
  - type: Rotatable
  - type: Sprite
    sprite: Structures/smalldispensers.rsi
    drawdepth: SmallObjects
    state: booze
  - type: Transform
    noRot: false
  - type: Machine
    board: BoozeDispenserMachineCircuitboard
  - type: GuideHelp
    guides:
    - Bartender
    - Drinks
  - type: StealTarget
    stealGroup: BoozeDispenser

# Boomer edit: SS13-style booze dispenser. Fixed reagent list generated on demand, gated by energy.
- type: entity
  id: BoozeDispenser
  suffix: Filled
  parent: BoozeDispenserEmpty
  components:
  - type: ReagentDispenser
    reagentIds:
    - Ale
    - Beer
    - CoffeeLiqueur
    - Cognac
    - Gin
    - Mead
    - Rum
    - Tequila
    - Vermouth
    - Vodka
    - Whiskey
    - Wine
