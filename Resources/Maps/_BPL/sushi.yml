        It is [bolt]NOT[/bolt], under any circumstances, to be used for:


        • Transportation of sentient lifeforms

        • Clown and/or Science experimentation


        Any personnel inserted into [bold]S.A.S.H.I.M.I.[/bold] will be penalised.


        Failure to maintain continuous operation of [bold]S.A.S.H.I.M.I.[/bold] throughout the shift will result in immediate enrolment in NanoTrasen's Conveyor Belt Familiarisation Program.


